<!DOCTYPE html>
<html>
<head>
    <title>PDF to JSON Converter</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; }
        .upload-area { border: 2px dashed #ccc; padding: 40px; text-align: center; margin: 20px 0; }
        .upload-area.dragover { border-color: #007cba; background: #f0f8ff; }
        button { background: #007cba; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        button:disabled { background: #ccc; }
        .result { margin-top: 20px; padding: 20px; background: #f5f5f5; border-radius: 5px; }
        textarea { width: 100%; height: 300px; font-family: monospace; }
    </style>
</head>
<body>
    <h1>PDF to JSON Converter</h1>
    
    <div class="upload-area" id="uploadArea">
        <p>Drag & drop PDF file here or click to select</p>
        <input type="file" id="fileInput" accept=".pdf" style="display: none;">
        <button onclick="document.getElementById('fileInput').click()">Select PDF File</button>
    </div>
    
    <button id="convertBtn" onclick="convertPDF()" disabled>Convert to JSON</button>
    
    <div class="result" id="result" style="display: none;">
        <h3>JSON Output:</h3>
        <textarea id="jsonOutput" readonly></textarea>
        <button onclick="downloadJSON()">Download JSON</button>
    </div>

    <script>
        let selectedFile = null;
        let jsonData = null;

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const convertBtn = document.getElementById('convertBtn');
        const result = document.getElementById('result');
        const jsonOutput = document.getElementById('jsonOutput');

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files[0] && files[0].type === 'application/pdf') {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            selectedFile = file;
            uploadArea.innerHTML = `<p>Selected: ${file.name}</p>`;
            convertBtn.disabled = false;
        }

        async function convertPDF() {
            if (!selectedFile) return;
            
            convertBtn.disabled = true;
            convertBtn.textContent = 'Converting...';
            
            const formData = new FormData();
            formData.append('pdf', selectedFile);
            
            try {
                const response = await fetch('/convert', {
                    method: 'POST',
                    body: formData
                });
                
                jsonData = await response.json();
                jsonOutput.value = JSON.stringify(jsonData, null, 2);
                result.style.display = 'block';
            } catch (error) {
                alert('Error converting PDF: ' + error.message);
            }
            
            convertBtn.disabled = false;
            convertBtn.textContent = 'Convert to JSON';
        }

        function downloadJSON() {
            if (!jsonData) return;
            
            const blob = new Blob([JSON.stringify(jsonData, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = selectedFile.name.replace('.pdf', '.json');
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
